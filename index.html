<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f7f4ee" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Opus" />
  <title>Opus</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="privacyShield" class="privacy-shield">
    <div class="shield-lock">⌘</div>
    <div>Opus заблоковано</div>
  </div>

  <main id="app" class="app-shell">
    <section id="authView" class="auth-view">
      <div class="auth-card">
        <div class="brand-mark">O</div>
        <h1>Opus</h1>
        <p class="muted">Особистий цифровий сейф та база знань</p>

        <div class="auth-tabs">
          <button id="loginTab" class="tab active" type="button">Вхід</button>
          <button id="registerTab" class="tab" type="button">Створити</button>
        </div>

        <form id="loginForm" class="form active">
          <label>Логін
            <input id="loginName" autocomplete="username" inputmode="email" placeholder="Ваш логін" />
          </label>
          <label>Пароль
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Пароль" />
          </label>
          <button class="primary-btn" type="submit">Увійти</button>
          <button id="quickPinBtn" class="ghost-btn hidden" type="button">Розблокувати PIN</button>
        </form>

        <form id="registerForm" class="form">
          <label>Новий логін
            <input id="registerName" autocomplete="username" placeholder="Наприклад: dmytro" />
          </label>
          <label>Пароль
            <input id="registerPassword" type="password" autocomplete="new-password" placeholder="Мінімум 8 символів" />
          </label>
          <label>Повторити пароль
            <input id="registerPassword2" type="password" autocomplete="new-password" placeholder="Ще раз пароль" />
          </label>
          <label>PIN-код
            <input id="registerPin" type="password" inputmode="numeric" maxlength="6" placeholder="4 або 6 цифр" />
          </label>
          <button class="primary-btn" type="submit">Створити сейф</button>
        </form>

        <form id="pinForm" class="form">
          <label>PIN-код
            <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="4 або 6 цифр" />
          </label>
          <button class="primary-btn" type="submit">Розблокувати</button>
          <button id="backToLoginBtn" class="ghost-btn" type="button">Логін і пароль</button>
        </form>

        <div id="authMessage" class="message"></div>
      </div>
    </section>

    <section id="mainView" class="main-view hidden">
      <header class="topbar">
        <div>
          <h2>Opus</h2>
          <p id="helloLine">Ваш сейф</p>
        </div>
        <div class="top-actions">
          <button id="themeBtn" class="icon-btn" type="button">◐</button>
          <button id="lockBtn" class="icon-btn" type="button">🔒</button>
        </div>
      </header>

      <section id="homeScreen" class="screen active">
        <div class="stats-grid">
          <article class="stat-card"><span id="totalCount">0</span><small>записів</small></article>
          <article class="stat-card"><span id="favCount">0</span><small>обраних</small></article>
          <article class="stat-card"><span id="pinCount">0</span><small>закріплених</small></article>
        </div>

        <div class="quick-actions">
          <button data-new="Щоденник" class="quick-btn">+ Щоденник</button>
          <button data-new="Нотатки" class="quick-btn">+ Нотатка</button>
          <button data-new="Промпти ШІ" class="quick-btn">+ Промпт</button>
        </div>

        <h3>Останні записи</h3>
        <div id="recentList" class="entry-list"></div>
      </section>

      <section id="searchScreen" class="screen">
        <div class="search-wrap">
          <input id="searchInput" placeholder="Пошук по всьому сейфу..." />
        </div>
        <div id="searchList" class="entry-list"></div>
      </section>

      <section id="editorScreen" class="screen editor-screen">
        <div class="editor-head">
          <button id="closeEditorBtn" class="ghost-btn small" type="button">Назад</button>
          <button id="saveEntryBtn" class="primary-btn small" type="button">Зберегти</button>
        </div>
        <input id="entryTitle" class="title-input" placeholder="Назва запису" />
        <select id="entryCategory" class="category-select"></select>
        <input id="entryTags" class="tag-input" placeholder="теги через кому" />
        <textarea id="entryBody" class="body-input" placeholder="Пиши сюди думки, нотатки, промпти, робочі записи..."></textarea>

        <div class="editor-tools">
          <label class="file-btn">Додати файли
            <input id="fileInput" type="file" multiple />
          </label>
          <button id="recordBtn" class="ghost-btn" type="button">🎙 Запис голосу</button>
          <button id="stopRecordBtn" class="ghost-btn hidden" type="button">■ Стоп</button>
        </div>
        <div id="attachmentsPreview" class="media-grid"></div>
      </section>

      <section id="categoriesScreen" class="screen">
        <h3>Категорії</h3>
        <div id="categoryList" class="category-list"></div>
      </section>

      <section id="settingsScreen" class="screen">
        <h3>Налаштування</h3>
        <div class="settings-card">
          <label>Автоблокування
            <select id="autoLockSelect">
              <option value="0">Одразу при згортанні</option>
              <option value="1">1 хвилина</option>
              <option value="5">5 хвилин</option>
              <option value="15">15 хвилин</option>
              <option value="30">30 хвилин</option>
            </select>
          </label>
          <button id="exportVaultBtn" class="ghost-btn" type="button">Експорт .vault</button>
          <label class="file-btn">Імпорт .vault
            <input id="importVaultInput" type="file" accept=".vault,application/json" />
          </label>
          <button id="exportJsonBtn" class="ghost-btn" type="button">Експорт JSON</button>
          <button id="wipeBtn" class="danger-btn" type="button">Стерти локальний сейф</button>
        </div>
      </section>

      <nav class="bottom-nav">
        <button data-screen="homeScreen" class="nav-btn active">⌂<span>Головна</span></button>
        <button data-screen="searchScreen" class="nav-btn">⌕<span>Пошук</span></button>
        <button id="newEntryBtn" class="create-btn">＋</button>
        <button data-screen="categoriesScreen" class="nav-btn">▦<span>Категорії</span></button>
        <button data-screen="settingsScreen" class="nav-btn">⚙<span>Параметри</span></button>
      </nav>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
